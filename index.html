<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickSell Marketplace</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f8f9fa; color: #333; }
        header { text-align: center; padding: 20px 0; background: #ffffff; border-bottom: 1px solid #ddd; margin-bottom: 30px; border-radius: 8px; }
        h1 { margin: 0; color: #ff9900; }
        .container { max-width: 800px; margin: 0 auto; }
        .form-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 40px; }
        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; width: 100%; box-sizing: border-box; }
        button { background: #ff9900; color: white; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .grid-title { border-bottom: 2px solid #ff9900; padding-bottom: 5px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        .price { color: #b12704; font-size: 20px; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>QuickSell Marketplace 🛒</h1>
        </header>
        <div class="form-card">
            <h2>List a New Item</h2>
            <form id="productForm">
                <div class="form-group">
                    <input type="text" id="title" placeholder="Item Name" required>
                    <input type="number" id="price" placeholder="Price (₹)" required>
                </div>
                <button type="submit">Publish Listing</button>
            </form>
        </div>
        <h2 class="grid-title">Recent Listings</h2>
        <div class="grid" id="productsGrid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ REPLACE WITH YOUR FIREBASE CONFIG KEYS
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const productsCollection = collection(db, "products");
        const productForm = document.getElementById('productForm');
        const productsGrid = document.getElementById('productsGrid');

        const q = query(productsCollection, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            productsGrid.innerHTML = "";
            snapshot.forEach((doc) => {
                const item = doc.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h3>${item.title}</h3><div class="price">₹${item.price}</div>`;
                productsGrid.appendChild(card);
            });
        });

        productForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const price = Number(document.getElementById('price').value);
            try {
                await addDoc(productsCollection, { title, price, createdAt: new Date().toISOString() });
                productForm.reset();
            } catch (error) { alert("Error adding product!"); }
        });
    </script>
</body>
</html>
